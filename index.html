<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Telemedicina Inteligente</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="index.css">

</head>

<body>

<div class="app">

<div class="text-center mb-3">
<h2> Telemedicina Inteligente</h2>
<p class="text-muted">Asistente con IA</p>
</div>

<div class="card p-3">

<!-- PERFIL -->
<div class="mb-2">
<input id="nombre" class="form-control" placeholder="Ingresa tu nombre">
</div>

<!-- CHAT -->
<div id="chat" class="chat-box"></div>

<!-- INPUT -->
<div class="d-flex mt-2">
<input id="input" class="form-control" placeholder="Describe tus síntomas">
<button class="btn btn-primary ms-2" onclick="enviar()">Enviar</button>
</div>

<!-- BOTONES -->
<div class="d-flex justify-content-between mt-2">
<button class="btn btn-outline-danger btn-sm" onclick="limpiar()">Limpiar</button>
<button class="btn btn-outline-secondary btn-sm" onclick="verHistorial()">Historial</button>
</div>

</div>
</div>

<script>
const chat = document.getElementById("chat");
let historial = [];

function hora() {
    return new Date().toLocaleTimeString();
}

function agregarMensaje(texto, tipo) {
    const div = document.createElement("div");
    div.className = "msg " + tipo;
    div.innerHTML = texto + `<div class="time">${hora()}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function limpiar() {
    chat.innerHTML = "";
}

function verHistorial() {
    if(historial.length === 0){
        agregarMensaje("No hay historial aún.", "bot");
        return;
    }

    let texto = "<b>Historial:</b><br>";
    historial.forEach(h => {
        texto += `📝 ${h}<br>`;
    });

    agregarMensaje(texto, "bot");
}

async function analizar(texto) {
    try {
        const res = await fetch("http://127.0.0.1:5000/analizar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ texto })
        });

        return await res.json();
    } catch {
        return {
            especialista: "No disponible",
            urgencia: "error",
            recomendacion: "No se pudo conectar con la IA"
        };
    }
}

async function enviar() {
    const input = document.getElementById("input");
    const nombre = document.getElementById("nombre").value || "Paciente";
    const texto = input.value.trim();

    if (!texto) return;

    agregarMensaje(`${nombre}: ${texto}`, "user");
    input.value = "";

    //  MENSAJE DE ANALISIS
    const loading = document.createElement("div");
    loading.className = "msg bot";
    loading.innerHTML = " Analizando síntomas...";
    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;

    // ⏳ PRIMER RETARDO (simula inicio IA)
    await new Promise(resolve => setTimeout(resolve, 1200));

    // 🧠 LLAMADA REAL A LA IA
    const res = await analizar(texto);

    // ⏳ SEGUNDO RETARDO (simula procesamiento)
    await new Promise(resolve => setTimeout(resolve, 800));

    // ❌ eliminar loading
    loading.remove();

    const respuesta = `
        👨‍⚕️ Especialista: <b>${res.especialista}</b><br>
        ⚠️ Urgencia: <b>${res.urgencia}</b><br>
        💡 ${res.recomendacion}
    `;

    historial.push(texto + " → " + res.especialista);

    await escribirTexto(respuesta, "bot");
}

agregarMensaje("Hola , soy tu asistente médico. ¿Cómo te sientes hoy?", "bot");
async function escribirTexto(texto, tipo) {
    const div = document.createElement("div");
    div.className = "msg " + tipo;
    chat.appendChild(div);

    let textoPlano = texto.replace(/<[^>]+>/g, ""); // quitar HTML para animación
    let i = 0;

    while (i < textoPlano.length) {
        div.innerHTML = textoPlano.substring(0, i + 1);
        i++;
        await new Promise(r => setTimeout(r, 15));
    }

    // 🔥 AL FINAL renderiza el HTML REAL
    div.innerHTML = texto + `<div class="time">${new Date().toLocaleTimeString()}</div>`;

    chat.scrollTop = chat.scrollHeight;

}
</script>

</body>
</html>

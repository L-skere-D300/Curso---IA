<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Telemedicina Inteligente</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="index.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4" style="max-width:500px">

<div class="text-center mb-3">
<h2>Telemedicina Inteligente</h2>
<p class="text-muted">Asistente con IA</p>
</div>

<div class="card p-3">

<input id="nombre" class="form-control mb-2" placeholder="Ingresa tu nombre">

<div id="chat" class="chat-box"></div>

<div class="d-flex mt-2">
<input id="input" class="form-control" placeholder="Describe tus síntomas">
<button class="btn btn-primary ms-2" onclick="enviar()">Enviar</button>
</div>

<div class="d-flex justify-content-between mt-2">
<button class="btn btn-outline-danger btn-sm" onclick="limpiar()">Limpiar</button>
<button class="btn btn-outline-secondary btn-sm" onclick="verHistorial()">Historial</button>
</div>

</div>
</div>

<script>
const chat = document.getElementById("chat");
let historial = [];

function hora() {
    return new Date().toLocaleTimeString();
}

function agregarMensaje(texto, tipo) {
    const div = document.createElement("div");
    div.className = "msg " + tipo;
    div.innerHTML = texto + `<div class="time">${hora()}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function limpiar() {
    chat.innerHTML = "";
}

function verHistorial() {
    if(historial.length === 0){
        agregarMensaje("No hay historial aún.", "bot");
        return;
    }

    let texto = "<b>Historial:</b><br>";
    historial.forEach(h => {
        texto += `📝 ${h}<br>`;
    });

    agregarMensaje(texto, "bot");
}

function iconoUrgencia(nivel) {
    if(nivel === "alta") return "🔴";
    if(nivel === "media") return "🟡";
    return "🟢";
}

async function analizar(texto) {
    try {
        const res = await fetch("http://127.0.0.1:5000/analizar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ texto })
        });

        return await res.json();
    } catch {
        return {
            mensaje: "No se pudo conectar con la IA",
            especialista: "No disponible",
            urgencia: "error"
        };
    }
}

async function enviar() {
    const input = document.getElementById("input");
    const nombre = document.getElementById("nombre").value || "Paciente";
    const texto = input.value.trim();

    if (!texto) return;

    agregarMensaje(`${nombre}: ${texto}`, "user");
    input.value = "";

    const loading = document.createElement("div");
    loading.className = "msg bot";
    loading.innerHTML = "Analizando síntomas...";
    chat.appendChild(loading);

    await new Promise(r => setTimeout(r, 1000));

    const res = await analizar(texto);

    loading.remove();

    const respuesta = `
         ${res.mensaje}<br><br>
         Especialista: <b>${res.especialista}</b><br>
        ${iconoUrgencia(res.urgencia)} Urgencia: <b>${res.urgencia}</b>
    `;

    historial.push(texto + " → " + res.especialista);

    escribirTexto(respuesta, "bot");
}

async function escribirTexto(texto, tipo) {
    const div = document.createElement("div");
    div.className = "msg " + tipo;
    chat.appendChild(div);

    let textoPlano = texto.replace(/<[^>]+>/g, "");
    let i = 0;

    while (i < textoPlano.length) {
        div.innerHTML = textoPlano.substring(0, i + 1);
        i++;
        await new Promise(r => setTimeout(r, 10));
    }

    div.innerHTML = texto + `<div class="time">${hora()}</div>`;
    chat.scrollTop = chat.scrollHeight;
}

// ENTER para enviar
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        enviar();
    }
});

// mensaje inicial
agregarMensaje("Hola, soy tu asistente médico. ¿Cómo te sientes hoy?", "bot");
</script>

</body>
</html>
